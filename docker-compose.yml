# SPECTRE Fleet Development Environment
# Services: NATS, TimescaleDB, Neo4j, Jaeger, Prometheus, Grafana

services:
  # NATS - Message Bus (Primary)
  nats:
    image: nats:2.10-alpine
    container_name: spectre-nats
    ports:
      - "4222:4222" # Client connections
      - "8222:8222" # HTTP monitoring
      - "6222:6222" # Cluster routing
    command:
      [
        "--http_port=8222",
        "--jetstream",
        "--store_dir=/data"
      ]
    volumes:
      - nats-data:/data
    networks:
      - spectre-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:8222/healthz" ]
      interval: 10s
      timeout: 5s
      retries: 3

  # TimescaleDB - Time-Series Database (for Observability)
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: spectre-timescaledb
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-spectre}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-spectre_observability}
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
      - ./scripts/init-timescaledb.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - spectre-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U spectre" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Neo4j - Graph Database (for Service Dependency Graph)
  neo4j:
    image: neo4j:5.15-community
    container_name: spectre-neo4j
    ports:
      - "7474:7474" # HTTP
      - "7687:7687" # Bolt
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:?NEO4J_PASSWORD must be set in .env}
      NEO4J_dbms_memory_heap_max__size: 512M
      NEO4J_dbms_memory_pagecache_size: 256M
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    networks:
      - spectre-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD}", "RETURN 1" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Jaeger - Distributed Tracing (OTLP receiver)
  jaeger:
    image: jaegertracing/all-in-one:1.53
    container_name: spectre-jaeger
    ports:
      - "16686:16686" # Jaeger UI
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - spectre-net
    restart: unless-stopped

  # Prometheus - Metrics collection
  prometheus:
    image: prom/prometheus:v2.48.1
    container_name: spectre-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - spectre-net
    restart: unless-stopped

  # Grafana - Dashboards
  grafana:
    image: grafana/grafana:10.2.3
    container_name: spectre-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - spectre-net
    restart: unless-stopped

volumes:
  nats-data:
    driver: local
  timescaledb-data:
    driver: local
  neo4j-data:
    driver: local
  neo4j-logs:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

networks:
  spectre-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
