# spectre NATS server — NKey authorization with per-subject ACLs
# Generated: 2026-03-29T13:52:30Z
#
# Per-service permissions follow the Spectre event schema:
#   {domain}.{entity}.{action}.v{version}
#
# Each service may only publish to its own domain subjects.
# Consumers (phantom-soc, cerebro) subscribe to upstream domains.

port: 4222
http_port: 8222

jetstream {
  store_dir: "/data"
  max_memory_store: 1GB
  max_file_store: 10GB
}

cluster {
  name: "spectre"
  port: 6222
}

authorization {
  users = [
    # ── owasaka — Network SIEM ─────────────────────────────────────────────
    # Publishes: network.asset.discovered.v1, network.dns.query.v1,
    #            network.dns.threat.v1, network.service.detected.v1,
    #            network.topology.updated.v1
    {
      nkey: "UA5O3KHAS3IHKQFP62G2KI752T7AOJ6XBGWWDO7NGNA5TZ7KQDBUVR4L"
      permissions: {
        publish: {
          allow: ["network.>"]
          deny:  ["system.>", "ingest.>", "cognition.>", "llm.>", "analysis.>", "compute.>"]
        }
        subscribe: {
          allow: ["_INBOX.>"]
          deny:  []
        }
      }
    }

    # ── ai-agent-os — System monitoring agent ──────────────────────────────
    # Publishes: system.metrics.v1
    {
      nkey: "UAVZZYUSLQDQESENQN2XRKWDNMRH2THN3WQPYQBPVRN7EVWWZDM7BHS6"
      permissions: {
        publish: {
          allow: ["system.>"]
          deny:  ["network.>", "ingest.>", "cognition.>", "llm.>", "analysis.>"]
        }
        subscribe: {
          allow: ["_INBOX.>"]
          deny:  []
        }
      }
    }

    # ── phantom — Document intelligence + RAG API ──────────────────────────
    # Publishes: ingest.file.created.v1, ingest.file.sanitized.v1,
    #            analysis.request.v1, analysis.response.v1
    # Subscribes: cognition.insight.generated.v1 (RAG index updates from cerebro)
    {
      nkey: "UATKNNRUFX3CAHNS4L23BCP2MLBPWB6L7U2RSAYGUF3TXKVFCZVOGRQ6"
      permissions: {
        publish: {
          allow: ["ingest.>", "analysis.>"]
          deny:  ["network.>", "system.>", "cognition.>", "llm.>"]
        }
        subscribe: {
          allow: ["cognition.insight.generated.v1", "_INBOX.>"]
          deny:  []
        }
      }
    }

    # ── phantom-soc — SOC data-plane event consumer ────────────────────────
    # Subscribes: network.>, system.>
    # Does not publish (read-only consumer)
    {
      nkey: "UDSSXYNMXM52RVTIPBMTCCAMBSBO6HDRTQZRXC77BO5HTWOVLAHLTLRO"
      permissions: {
        publish: {
          allow: ["_INBOX.>"]
          deny:  ["network.>", "system.>", "ingest.>", "cognition.>", "llm.>"]
        }
        subscribe: {
          allow: ["network.>", "system.>", "_INBOX.>"]
          deny:  []
        }
      }
    }

    # ── cerebro — Knowledge extraction + RAG ──────────────────────────────
    # Subscribes: ingest.file.sanitized.v1
    # Publishes:  cognition.query.received.v1, cognition.insight.generated.v1
    {
      nkey: "UDO6W77GN27YBWYQ373V5CFDTRXOBMNHBYOXIYHAJ4OMLCESQUKDE3SI"
      permissions: {
        publish: {
          allow: ["cognition.>"]
          deny:  ["network.>", "system.>", "ingest.>", "llm.>"]
        }
        subscribe: {
          allow: ["ingest.file.sanitized.v1", "_INBOX.>"]
          deny:  []
        }
      }
    }

    # ── securellm-bridge — Zero-trust LLM proxy ───────────────────────────
    # Publishes: llm.request.v1, llm.response.v1
    {
      nkey: "UCQQOWLNEZNNUMRIW6HI4WZ2FMF6MQCZF4U7MTTUUCLARJ4EYN43FFN2"
      permissions: {
        publish: {
          allow: ["llm.>"]
          deny:  ["network.>", "system.>", "ingest.>", "cognition.>"]
        }
        subscribe: {
          allow: ["_INBOX.>"]
          deny:  []
        }
      }
    }
  ]
}
