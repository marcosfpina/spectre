name: SPECTRE Fleet CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Job 1: Check formatting
  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Nix
        uses: cachix/install-nix-action@v22
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Check formatting
        run: nix develop --command cargo fmt -- --check

  # Job 2: Clippy (linting)
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Nix
        uses: cachix/install-nix-action@v22
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Run Clippy
        run: nix develop --command cargo clippy --all-targets --all-features -- -D warnings

  # Job 3: Unit tests (all crates)
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          - spectre-core
          - spectre-events
          - spectre-proxy
          - spectre-secrets
          - spectre-observability
    steps:
      - uses: actions/checkout@v3

      - name: Install Nix
        uses: cachix/install-nix-action@v22
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Run unit tests - ${{ matrix.package }}
        run: nix develop --command cargo test -p ${{ matrix.package }} --lib
        env:
          JWT_SECRET: test-secret
          NATS_URL: nats://localhost:4222

  # Job 4: Integration tests (requires NATS)
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      nats:
        image: nats:2.10-alpine
        ports:
          - 4222:4222
          - 8222:8222
        options: >-
          --health-cmd "nats server check jetstream"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        env:
          NATS_JETSTREAM: "1"

    steps:
      - uses: actions/checkout@v3

      - name: Install Nix
        uses: cachix/install-nix-action@v22
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Wait for NATS
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:8222/healthz | grep -q "ok"; then
              echo "NATS is ready"
              break
            fi
            echo "Waiting for NATS..."
            sleep 1
          done

      - name: Run integration tests
        run: nix develop --command cargo test --test test_event_bus -- --test-threads=1
        env:
          NATS_URL: nats://localhost:4222

  # Job 5: Build check (all crates)
  build:
    name: Build Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          - spectre-core
          - spectre-events
          - spectre-proxy
          - spectre-secrets
          - spectre-observability
    steps:
      - uses: actions/checkout@v3

      - name: Install Nix
        uses: cachix/install-nix-action@v22
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build ${{ matrix.package }}
        run: nix develop --command cargo build -p ${{ matrix.package }} --release

      - name: Check binary size
        run: |
          if [ -f target/release/${{ matrix.package }} ]; then
            size=$(ls -lh target/release/${{ matrix.package }} | awk '{print $5}')
            echo "Binary size: $size"
          fi

  # Job 6: Security audit
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Nix
        uses: cachix/install-nix-action@v22
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Run cargo audit
        run: nix develop --command cargo audit

  # Job 7: Documentation build
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Nix
        uses: cachix/install-nix-action@v22
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build documentation
        run: nix develop --command cargo doc --no-deps --all-features

      - name: Check for broken links
        run: |
          echo "Documentation built successfully"

  # Job 8: Docker build (traditional)
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t spectre-proxy:ci .

      - name: Check image size
        run: |
          size=$(docker image inspect spectre-proxy:ci --format='{{.Size}}')
          size_mb=$((size / 1024 / 1024))
          echo "Image size: ${size_mb}MB"
          if [ $size_mb -gt 100 ]; then
            echo "WARNING: Image size exceeds 100MB target"
          fi

  # Job 9: SBOM generation
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v3

      - name: Install Nix
        uses: cachix/install-nix-action@v22
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Install cargo-cyclonedx
        run: nix develop --command cargo install cargo-cyclonedx

      - name: Generate SBOM
        run: nix develop --command bash -c "export PATH=$HOME/.cargo/bin:\$PATH && cargo cyclonedx --format json"

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v3
        with:
          name: sbom
          path: crates/**/*.cdx.json

  # Job 10: Nix container image build
  nix-image:
    name: Nix Container Image
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v3

      - name: Install Nix
        uses: cachix/install-nix-action@v22
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build container image via Nix
        run: nix build .#spectre-proxy-image --print-out-paths

      - name: Check image
        run: |
          IMAGE_PATH=$(nix build .#spectre-proxy-image --print-out-paths --no-link)
          size=$(ls -lh "$IMAGE_PATH" | awk '{print $5}')
          echo "Nix image size: $size"

  # Job 10: Kubernetes manifest validation
  k8s-manifests:
    name: K8s Manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Nix
        uses: cachix/install-nix-action@v22
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Generate dev manifests
        run: nix build .#kubernetes-manifests-dev --print-out-paths

      - name: Generate prod manifests
        run: nix build .#kubernetes-manifests-prod --print-out-paths

      - name: Validate manifests
        run: |
          DEV=$(nix build .#kubernetes-manifests-dev --print-out-paths --no-link)
          PROD=$(nix build .#kubernetes-manifests-prod --print-out-paths --no-link)
          echo "Dev manifests generated: $(wc -c < $DEV) bytes"
          echo "Prod manifests generated: $(wc -c < $PROD) bytes"
